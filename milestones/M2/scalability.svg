<svg viewBox="0 0 960 1500" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">

  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f78166"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e3b341"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="1500" fill="#0d1117" rx="12"/>
  <!-- Outer border -->
  <rect x="10" y="10" width="940" height="1480" fill="none" stroke="#30363d" stroke-width="1.5" rx="8"/>

  <!-- ═══ TITLE BAR ═══ -->
  <rect x="10" y="10" width="940" height="48" fill="#161b22" rx="8"/>
  <rect x="10" y="42" width="940" height="16" fill="#161b22"/>
  <line x1="10" y1="58" x2="950" y2="58" stroke="#30363d" stroke-width="1.5"/>
  <text x="480" y="39" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold" letter-spacing="2">VIBE CHECK — SCALABILITY DIAGRAM</text>

  <!-- ═══ WEB BROWSER ═══ -->
  <rect x="340" y="78" width="280" height="64" fill="#161b22" stroke="#388bfd" stroke-width="1.5" rx="6"/>
  <text x="480" y="103" text-anchor="middle" fill="#79c0ff" font-size="13" font-weight="bold">Web Browser</text>
  <text x="480" y="124" text-anchor="middle" fill="#8b949e" font-size="12">(React Client)</text>

  <!-- Browser splits: left branch → CDN, right branch → Route 53 -->
  <!-- Left fork line -->
  <line x1="400" y1="142" x2="400" y2="162" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="400" y1="162" x2="180" y2="162" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="180" y1="162" x2="180" y2="188" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="270" y="155" text-anchor="middle" fill="#8b949e" font-size="10">Static assets</text>

  <!-- Right fork line -->
  <line x1="560" y1="142" x2="560" y2="162" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="560" y1="162" x2="680" y2="162" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="680" y1="162" x2="680" y2="188" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="620" y="155" text-anchor="middle" fill="#8b949e" font-size="10">API calls</text>

  <!-- ═══ CDN ═══ -->
  <rect x="60" y="188" width="240" height="60" fill="#161b22" stroke="#56d364" stroke-width="1.5" rx="6"/>
  <text x="180" y="212" text-anchor="middle" fill="#56d364" font-size="13" font-weight="bold">CDN</text>
  <text x="180" y="230" text-anchor="middle" fill="#8b949e" font-size="11">Static Asset Delivery</text>
  <!-- CDN closed bottom — no further connections needed -->

  <!-- ═══ AWS ROUTE 53 ═══ -->
  <rect x="520" y="188" width="320" height="60" fill="#161b22" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <text x="680" y="212" text-anchor="middle" fill="#56d364" font-size="13" font-weight="bold">AWS Route 53</text>
  <text x="680" y="230" text-anchor="middle" fill="#8b949e" font-size="12">DNS Routing</text>

  <!-- Route53 → ALB -->
  <line x1="680" y1="248" x2="680" y2="278" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ═══ AWS ALB ═══ -->
  <rect x="520" y="278" width="320" height="68" fill="#161b22" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <text x="680" y="302" text-anchor="middle" fill="#56d364" font-size="13" font-weight="bold">AWS Elastic Load Balancer (ALB)</text>
  <text x="680" y="320" text-anchor="middle" fill="#8b949e" font-size="12">Round-robin routing</text>
  <text x="680" y="337" text-anchor="middle" fill="#8b949e" font-size="11">More users = add more App Servers</text>

  <!-- ALB → App Server 1 -->
  <line x1="600" y1="346" x2="270" y2="400" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- ALB → App Server 2 -->
  <line x1="720" y1="346" x2="720" y2="400" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ═══ APP SERVER 1 ═══ -->
  <rect x="50" y="400" width="300" height="170" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" rx="6"/>
  <rect x="50" y="400" width="300" height="28" fill="#1e1b2e" rx="6"/>
  <rect x="50" y="415" width="300" height="13" fill="#1e1b2e"/>
  <text x="200" y="419" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="bold">App Server 1</text>
  <text x="200" y="434" text-anchor="middle" fill="#8b949e" font-size="11">(EC2 / Node.js)</text>
  <line x1="50" y1="440" x2="350" y2="440" stroke="#30363d" stroke-width="1"/>
  <text x="70" y="460" fill="#79c0ff" font-size="11">POST  /api/notes</text>
  <text x="70" y="478" fill="#79c0ff" font-size="11">GET   /api/heatmap</text>
  <text x="70" y="496" fill="#79c0ff" font-size="11">POST  /api/users</text>
  <text x="70" y="514" fill="#79c0ff" font-size="11">GET   /api/friends</text>
  <text x="70" y="532" fill="#79c0ff" font-size="11">GET   /api/notifications</text>
  <text x="70" y="558" fill="#8b949e" font-size="10">Cron job runs here (1 server only)</text>

  <!-- ═══ APP SERVER 2 ═══ -->
  <rect x="570" y="400" width="300" height="160" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" rx="6"/>
  <rect x="570" y="400" width="300" height="28" fill="#1e1b2e" rx="6"/>
  <rect x="570" y="415" width="300" height="13" fill="#1e1b2e"/>
  <text x="720" y="419" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="bold">App Server 2</text>
  <text x="720" y="434" text-anchor="middle" fill="#8b949e" font-size="11">(EC2 / Node.js)</text>
  <line x1="570" y1="440" x2="870" y2="440" stroke="#30363d" stroke-width="1"/>
  <text x="590" y="460" fill="#79c0ff" font-size="11">POST  /api/notes</text>
  <text x="590" y="478" fill="#79c0ff" font-size="11">GET   /api/heatmap</text>
  <text x="590" y="496" fill="#79c0ff" font-size="11">POST  /api/users</text>
  <text x="590" y="514" fill="#79c0ff" font-size="11">GET   /api/friends</text>
  <text x="590" y="532" fill="#79c0ff" font-size="11">GET   /api/notifications</text>

  <!-- Converge lines from both servers → shared T-junction at y=618 -->
  <line x1="200" y1="570" x2="200" y2="618" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="720" y1="560" x2="720" y2="618" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="200" y1="618" x2="720" y2="618" stroke="#58a6ff" stroke-width="1.5"/>

  <!-- 3 drops from junction to shared services -->
  <line x1="200" y1="618" x2="200" y2="648" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="618" x2="480" y2="648" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="720" y1="618" x2="720" y2="648" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <text x="480" y="638" text-anchor="middle" fill="#8b949e" font-size="10">All servers share the same:</text>

  <!-- ═══ POSTGRESQL PRIMARY ═══ -->
  <rect x="30" y="650" width="250" height="168" fill="#161b22" stroke="#f78166" stroke-width="1.5" rx="6"/>
  <rect x="30" y="650" width="250" height="28" fill="#2d1b1b" rx="6"/>
  <rect x="30" y="665" width="250" height="13" fill="#2d1b1b"/>
  <text x="155" y="668" text-anchor="middle" fill="#f78166" font-size="12" font-weight="bold">PostgreSQL Primary (RDS)</text>
  <line x1="30" y1="678" x2="280" y2="678" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="696" fill="#e6edf3" font-size="11">All writes</text>
  <text x="50" y="714" fill="#e6edf3" font-size="11">ACID compliant</text>
  <text x="50" y="732" fill="#e6edf3" font-size="11">FK enforcement</text>
  <text x="50" y="750" fill="#e6edf3" font-size="11">PostGIS ext.</text>
  <text x="50" y="768" fill="#e6edf3" font-size="11">Radius queries</text>
  <text x="50" y="800" fill="#8b949e" font-size="10">↓ WAL stream</text>

  <!-- ═══ REDIS CACHE ═══ -->
  <rect x="355" y="650" width="250" height="140" fill="#161b22" stroke="#e3b341" stroke-width="1.5" rx="6"/>
  <rect x="355" y="650" width="250" height="28" fill="#2b2200" rx="6"/>
  <rect x="355" y="665" width="250" height="13" fill="#2b2200"/>
  <text x="480" y="668" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="bold">Redis Cache</text>
  <text x="480" y="684" text-anchor="middle" fill="#8b949e" font-size="11">(Heatmap / App Cache)</text>
  <line x1="355" y1="678" x2="605" y2="678" stroke="#30363d" stroke-width="1"/>
  <text x="375" y="700" fill="#e6edf3" font-size="11">2 min TTL</text>
  <text x="375" y="718" fill="#e6edf3" font-size="11">activity_score</text>
  <text x="375" y="736" fill="#e6edf3" font-size="11">avg_vibe_score</text>
  <text x="375" y="754" fill="#8b949e" font-size="10">Replaces in-memory heatmap cache</text>
  <text x="375" y="780" fill="#56d364" font-size="10">★ Shared across all app servers</text>

  <!-- ═══ REDIS SESSION STORE ═══ -->
  <rect x="680" y="650" width="250" height="140" fill="#161b22" stroke="#e3b341" stroke-width="1.5" rx="6"/>
  <rect x="680" y="650" width="250" height="28" fill="#2b2200" rx="6"/>
  <rect x="680" y="665" width="250" height="13" fill="#2b2200"/>
  <text x="805" y="668" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="bold">Redis Session Store</text>
  <text x="805" y="684" text-anchor="middle" fill="#8b949e" font-size="11">(Auth / Sessions)</text>
  <line x1="680" y1="678" x2="930" y2="678" stroke="#30363d" stroke-width="1"/>
  <text x="700" y="700" fill="#e6edf3" font-size="11">Auth tokens</text>
  <text x="700" y="718" fill="#e6edf3" font-size="11">Session data</text>
  <text x="700" y="736" fill="#e6edf3" font-size="11">TTL-based expiry</text>
  <text x="700" y="754" fill="#8b949e" font-size="10">Replaces in-memory session store</text>
  <text x="700" y="780" fill="#56d364" font-size="10">★ Shared across all app servers</text>

  <!-- WAL stream PG Primary → Replica -->
  <line x1="155" y1="818" x2="155" y2="898" stroke="#f78166" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="163" y="862" fill="#8b949e" font-size="10">WAL stream</text>

  <!-- ═══ POSTGRESQL REPLICA ═══ -->
  <rect x="30" y="900" width="250" height="130" fill="#161b22" stroke="#f78166" stroke-width="1.5" rx="6"/>
  <rect x="30" y="900" width="250" height="28" fill="#2d1b1b" rx="6"/>
  <rect x="30" y="915" width="250" height="13" fill="#2d1b1b"/>
  <text x="155" y="918" text-anchor="middle" fill="#f78166" font-size="12" font-weight="bold">PostgreSQL Replica (RDS)</text>
  <line x1="30" y1="928" x2="280" y2="928" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="948" fill="#e6edf3" font-size="11">All reads</text>
  <text x="50" y="966" fill="#e6edf3" font-size="11">Heatmap queries</text>
  <text x="50" y="984" fill="#e6edf3" font-size="11">Analytics</text>

  <!-- ═══ EXPIRY JOB ═══ -->
  <rect x="660" y="810" width="260" height="110" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" rx="6"/>
  <rect x="660" y="810" width="260" height="28" fill="#0d1e35" rx="6"/>
  <rect x="660" y="825" width="260" height="13" fill="#0d1e35"/>
  <text x="790" y="828" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">Expiry Job (Cron)</text>
  <line x1="660" y1="838" x2="920" y2="838" stroke="#30363d" stroke-width="1"/>
  <text x="680" y="858" fill="#e6edf3" font-size="11">DELETE expired notes</text>
  <text x="680" y="876" fill="#e6edf3" font-size="11">Runs every 15 min</text>
  <text x="680" y="894" fill="#e6edf3" font-size="11">Runs on 1 server only</text>

  <!-- Dotted line from App Server 1 → Expiry Job -->
  <line x1="350" y1="510" x2="648" y2="845" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Replica → Backup arrow -->
  <line x1="155" y1="1030" x2="155" y2="1078" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ═══ BACKUP AND RECOVERY ═══ -->
  <rect x="30" y="1080" width="900" height="90" fill="#161b22" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <rect x="30" y="1080" width="900" height="28" fill="#0d2010" rx="6"/>
  <rect x="30" y="1095" width="900" height="13" fill="#0d2010"/>
  <text x="480" y="1098" text-anchor="middle" fill="#56d364" font-size="13" font-weight="bold">Backup and Recovery</text>
  <line x1="30" y1="1108" x2="930" y2="1108" stroke="#30363d" stroke-width="1"/>
  <text x="480" y="1128" text-anchor="middle" fill="#e6edf3" font-size="12">Nightly pg_dump → Compressed → S3 upload</text>
  <text x="480" y="1150" text-anchor="middle" fill="#8b949e" font-size="11">Failover: promote replica manually if primary fails</text>

  <!-- ═══ HORIZONTAL SCALING EXPLAINER ═══ -->
  <rect x="30" y="1192" width="900" height="272" fill="#0d1117" stroke="#388bfd" stroke-width="1.5" rx="6" stroke-dasharray="6,3"/>
  <text x="480" y="1216" text-anchor="middle" fill="#388bfd" font-size="13" font-weight="bold">How Horizontal Scaling Works Here</text>
  <line x1="30" y1="1224" x2="930" y2="1224" stroke="#30363d" stroke-width="1"/>

  <text x="480" y="1250" text-anchor="middle" fill="#e6edf3" font-size="12">More users = add more App Servers</text>
  <line x1="480" y1="1256" x2="480" y2="1274" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="480" y="1290" text-anchor="middle" fill="#e6edf3" font-size="12">Load Balancer automatically distributes requests across them</text>
  <line x1="480" y1="1296" x2="480" y2="1314" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="480" y="1330" text-anchor="middle" fill="#e6edf3" font-size="12">All servers share the same:</text>
  <text x="480" y="1352" text-anchor="middle" fill="#79c0ff" font-size="12">- PostgreSQL Primary (writes)   - PostgreSQL Replica (reads)</text>
  <text x="480" y="1372" text-anchor="middle" fill="#e3b341" font-size="12">- Redis Cache (heatmap)   - Redis Session Store (auth)</text>
  <text x="480" y="1396" text-anchor="middle" fill="#56d364" font-size="12">- CDN (static assets, served independently)</text>
  <text x="480" y="1448" text-anchor="middle" fill="#8b949e" font-size="10">* Stateless app servers = scale freely  |  Redis replaces per-server in-memory stores  |  CDN offloads static traffic</text>

</svg>
